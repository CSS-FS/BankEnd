services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flocksense_backend_app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/vendor
    depends_on:
      pgsql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - appnet

  nginx:
    image: nginx:1.27-alpine
    container_name: flocksense_backend_nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www:ro
      - vendor_data:/var/www/vendor:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - appnet

  pgsql:
    image: postgres:16-alpine
    container_name: flocksense_backend_pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-flocksense_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-flocksense_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - appnet

volumes:
  pgsql_data:
  vendor_data:

networks:
  appnet:
    driver: bridge
